services:
  db:
    image: postgres:18.3-alpine3.23
    # Tight Postgres knobs sized for a single-instance deployment on a
    # small server. Tuned for ~128 MB RSS instead of the default ~300 MB.
    command:
      - postgres
      - -c
      - shared_buffers=32MB
      - -c
      - effective_cache_size=96MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - max_connections=25
      - -c
      - wal_buffers=512kB
      - -c
      - jit=off
      - -c
      - max_wal_size=256MB
      - -c
      - min_wal_size=64MB
    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: vapor
      POSTGRES_PASSWORD: vapor
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    # Keep 5432 bound to the host loopback so local tooling still works but
    # the port is not reachable from the network. Remove entirely if no
    # external tooling is needed.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor -d tasktracker -q"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # Hard memory ceiling — OOM-kills before the host swaps itself to death.
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M
    mem_limit: 192m
    mem_reservation: 64m

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: be-api:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: tasktracker
      DATABASE_USERNAME: vapor
      DATABASE_PASSWORD: vapor
      JWT_SECRET: change-me-in-production-use-long-random-string
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "busybox wget -q -O - http://localhost:8080/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # The Vapor service comfortably runs under 64 MB at idle; give it a
    # little head-room for request bursts while still holding the entire
    # stack (api + db) well under 256 MB.
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 48M
    mem_limit: 128m
    mem_reservation: 48m

volumes:
  postgres_data:
